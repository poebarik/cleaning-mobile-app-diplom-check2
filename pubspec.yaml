name: cleaning_mobile_application
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.0

  # Networking
  dio: ^5.4.0
  retrofit: ^4.0.1  # Понижена версия для совместимости
  logger: ^2.0.2

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # JSON
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1

  # Utils
  intl: ^0.18.1
  image_picker: ^1.0.5
  cached_network_image: ^3.3.0

  # Loading
  shimmer: ^3.0.0
  flutter_easyloading: ^3.0.5

  # Functional programming
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.5
  retrofit_generator: ^8.0.0  # Понижена версия для совместимости

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/